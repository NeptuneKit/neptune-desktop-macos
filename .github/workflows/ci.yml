name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Validate smoke test script
        run: |
          bash -n scripts/smoke-test-app.sh
          bash scripts/test-smoke-test-app.sh
